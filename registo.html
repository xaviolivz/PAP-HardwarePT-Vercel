<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - HardwarePT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: inherit;">
                        <img src="imagens/logo.png" alt="HardwarePT" class="logo-img">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-box">
                <h2>Criar conta</h2>
                <p class="auth-subtitle">Junta-te à HardwarePT</p>

                <div id="mensagem-erro"></div>
                <div id="mensagem-sucesso"></div>

                <form id="form-registo">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for="nif">NIF <span class="optional">(opcional)</span></label>
                        <input type="text" id="nif" maxlength="9"
                               pattern="\d{9}" title="O NIF deve ter 9 dígitos">
                    </div>

                    <div class="form-group">
                        <label for="password">Palavra-passe</label>
                        <div class="pw-wrap">
                            <input type="password" id="password"
                                   required minlength="6">
                            <button type="button" class="pw-toggle" onclick="togglePw('password', this)" aria-label="Mostrar/ocultar">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="passwordconfirm">Confirmar Palavra-passe</label>
                        <div class="pw-wrap">
                            <input type="password" id="passwordconfirm"
                                   required minlength="6">
                            <button type="button" class="pw-toggle" onclick="togglePw('passwordconfirm', this)" aria-label="Mostrar/ocultar">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" required>
                            <span>Aceito os <a href="termos.html">Termos de Uso</a> e <a href="privacidade.html">Política de Privacidade</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary btn-large">
                        Criar Conta
                    </button>
                </form>

                <div class="auth-divider"><span>ou</span></div>

                <div class="auth-footer">
                    <p>Já tem conta? <a href="login.html">Inicie Sessão</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/add-to-cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/carrinho.js"></script>

    <script>
        function togglePw(id, btn) {
            const inp = document.getElementById(id);
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            btn.querySelector('svg').innerHTML = show
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
    </script>

</body>
</html>
